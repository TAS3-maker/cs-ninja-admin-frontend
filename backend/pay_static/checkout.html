<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>CSninja — Secure Checkout</title>
  <link rel="icon" href="/api/admin-ui/favicon.svg" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #1a237e 0%, #4a148c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #0d0d0d;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      max-width: 460px;
      width: 100%;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .brand h1 span { color: #ffc107; }
    .brand p {
      font-size: 12px;
      color: #90a4ae;
      margin-top: 4px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .summary {
      background: #f8f9fc;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .summary .label {
      font-size: 11px;
      color: #90a4ae;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .summary h2 {
      font-size: 18px;
      font-weight: 800;
      margin: 4px 0 14px;
      line-height: 1.3;
    }
    .summary .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
      color: #455a64;
    }
    .summary .row.total {
      border-top: 1px dashed #cfd8dc;
      padding-top: 14px;
      margin-top: 8px;
      font-weight: 800;
      color: #1a237e;
      font-size: 18px;
    }
    .price-old {
      color: #90a4ae;
      text-decoration: line-through;
      margin-right: 6px;
      font-size: 13px;
    }
    button.pay {
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      letter-spacing: 0.3px;
    }
    button.pay:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(26,35,126,0.35); }
    button.pay:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .badges {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 18px;
      font-size: 11px;
      color: #90a4ae;
    }
    .badges span { display: flex; align-items: center; gap: 4px; }
    .alert {
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .alert.err  { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
    .alert.ok   { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a237e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .center { text-align: center; }
    .small { font-size: 12px; color: #90a4ae; margin-top: 12px; }
    .return-btn {
      margin-top: 16px;
      background: #fff;
      color: #1a237e;
      border: 2px solid #1a237e;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>CS<span>ninja</span></h1>
      <p>Secure Checkout</p>
    </div>
    <div id="content">
      <div class="spinner"></div>
      <div class="center small">Loading order…</div>
    </div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const courseId   = params.get('course_id');
const token      = params.get('token');
const returnUrl  = params.get('return_url') || '';
const couponPct  = parseInt(params.get('coupon_pct') || '0', 10);
const couponCode = params.get('coupon_code') || '';
const addressId  = params.get('address_id') || '';

const $ = (id) => document.getElementById(id);

if (!courseId || !token) {
  $('content').innerHTML = '<div class="alert err"><b>Invalid link</b><br>Missing course or auth token. Please return to the app and try again.</div>';
} else {
  fetch(`/api/courses/${courseId}`)
    .then((r) => r.json())
    .then(renderSummary)
    .catch((e) => { $('content').innerHTML = `<div class="alert err">Could not load course: ${e.message}</div>`; });
}

function renderSummary(course) {
  const price    = Math.max(1, Math.round(course.price));
  const discount = Math.round(price * (couponPct / 100));
  const total    = price - discount;

  $('content').innerHTML = `
    <div class="summary">
      <div class="label">You're enrolling in</div>
      <h2>${course.title}</h2>
      <div class="row">
        <span>${course.category} · ${course.level || ''}</span>
        <span>${course.duration || ''}</span>
      </div>
      <div class="row">
        <span>Course Price</span>
        <span>${course.originalPrice ? `<span class="price-old">₹${course.originalPrice.toLocaleString('en-IN')}</span>` : ''}₹${price.toLocaleString('en-IN')}</span>
      </div>
      ${discount ? `<div class="row" style="color:#2e7d32"><span>Coupon (${couponPct}% off)</span><span>− ₹${discount.toLocaleString('en-IN')}</span></div>` : ''}
      <div class="row total"><span>Total Payable</span><span>₹${total.toLocaleString('en-IN')}</span></div>
    </div>
    <button class="pay" id="payBtn">Pay ₹${total.toLocaleString('en-IN')} securely</button>
    <div class="badges">
      <span>🔒 256-bit SSL</span>
      <span>🛡️ PCI-DSS</span>
      <span>⚡ Razorpay</span>
    </div>
    <div class="small center" style="margin-top:16px">After payment you'll return to the app automatically.</div>
  `;
  $('payBtn').onclick = () => startPayment(course, total);
}

async function startPayment(course, totalInr) {
  $('payBtn').disabled = true;
  $('payBtn').textContent = 'Creating order…';
  try {
    // 1. Ask backend to create a Razorpay order
    const res = await fetch('/api/payments/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ course_id: course.id, amount: totalInr, coupon_code: couponCode, address_id: addressId || undefined }),
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Order creation failed');
    const order = await res.json();

    // 2. Open Razorpay checkout
    const rzp = new Razorpay({
      key: order.key_id,
      amount: order.amount,
      currency: order.currency || 'INR',
      order_id: order.order_id,
      name: 'CSninja',
      description: course.title,
      image: '/api/admin-ui/favicon.svg',
      theme: { color: '#1a237e' },
      handler: async function (resp) {
        await verifyAndShowSuccess(resp, course);
      },
      modal: {
        ondismiss: function () {
          $('payBtn').disabled = false;
          $('payBtn').textContent = `Pay ₹${totalInr.toLocaleString('en-IN')} securely`;
        },
      },
    });
    rzp.on('payment.failed', function (resp) {
      showError(resp.error?.description || 'Payment failed. Please try again.');
    });
    rzp.open();
  } catch (e) {
    showError(e.message);
  }
}

async function verifyAndShowSuccess(resp, course) {
  $('content').innerHTML = '<div class="spinner"></div><div class="center small">Verifying payment…</div>';
  try {
    const verify = await fetch('/api/payments/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        razorpay_order_id: resp.razorpay_order_id,
        razorpay_payment_id: resp.razorpay_payment_id,
        razorpay_signature: resp.razorpay_signature,
        course_id: course.id,
      }),
    });
    if (!verify.ok) throw new Error((await verify.json()).error || 'Verification failed');
    showSuccess(course);
  } catch (e) {
    showError(e.message);
  }
}

function showSuccess(course) {
  // Tell mobile app via deep link if return_url provided
  const deepLink = returnUrl
    ? `${returnUrl}?status=success&course=${encodeURIComponent(course.id)}`
    : 'csninja://payment?status=success&course=' + encodeURIComponent(course.id);

  $('content').innerHTML = `
    <div class="alert ok"><b>✓ Payment Successful</b><br>You're now enrolled in <b>${course.title}</b>.</div>
    <div class="center">
      <div style="font-size:64px; margin: 14px 0;">🎉</div>
      <button class="pay" id="ret">Return to App</button>
      <div class="small">If the app doesn't open automatically, just close this window.</div>
    </div>
  `;
  $('ret').onclick = () => { location.href = deepLink; };
  // auto-attempt deep link after 1.5s
  setTimeout(() => { try { location.href = deepLink; } catch (_) {} }, 1500);
}

function showError(msg) {
  $('content').innerHTML = `
    <div class="alert err"><b>Payment Issue</b><br>${msg}</div>
    <button class="return-btn" onclick="location.reload()">Try Again</button>
    <button class="return-btn" style="margin-top:8px" onclick="window.close()">Close</button>
  `;
}
</script>
</body>
</html>
